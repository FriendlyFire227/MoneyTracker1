<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTracker Pro</title>
    <link rel="stylesheet" href="/style.css">
    <!-- Графики -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="theme-switcher">
        <button id="themeToggle" class="theme-btn">🌙 Темная тема</button>
    </div>

    <div class="container">
        <header>
            <h1>💰 MoneyTracker Pro</h1>
            <p class="subtitle">Умный учет финансов</p>
        </header>

        <!-- Баланс -->
        <div class="balance-card glass-effect">
            <div class="balance-header">
                <h2>Текущий баланс</h2>
                <select id="periodSelect" class="period-select">
                    <option value="all">За всё время</option>
                    <option value="today">За сегодня</option>
                    <option value="week">За неделю</option>
                    <option value="month">За месяц</option>
                </select>
            </div>
            <div class="balance-amount" id="balance">0 ₽</div>
        </div>

        <!-- Статистика в карточках -->
        <div class="stats-grid">
            <div class="stat-card income-card">
                <div class="stat-icon">💰</div>
                <div class="stat-info">
                    <span class="stat-label">Доходы</span>
                    <span class="stat-value" id="totalIncome">0 ₽</span>
                </div>
            </div>
            <div class="stat-card expense-card">
                <div class="stat-icon">💸</div>
                <div class="stat-info">
                    <span class="stat-label">Расходы</span>
                    <span class="stat-value" id="totalExpense">0 ₽</span>
                </div>
            </div>
            <div class="stat-card transactions-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <span class="stat-label">Операций</span>
                    <span class="stat-value" id="totalTransactions">0</span>
                </div>
            </div>
        </div>

        <!-- Графики -->
        <div class="charts-row">
            <div class="chart-container glass-effect">
                <h3>📊 Расходы по категориям</h3>
                <canvas id="expenseChart"></canvas>
            </div>
            <div class="chart-container glass-effect">
                <h3>📈 Динамика</h3>
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- Форма добавления -->
        <div class="form-card glass-effect">
            <h3>➕ Новая операция</h3>
            <form id="transactionForm" action="/api/add" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label>Тип</label>
                        <div class="type-selector">
                            <label class="type-option income-option">
                                <input type="radio" name="type" value="income" checked>
                                <span>💰 Доход</span>
                            </label>
                            <label class="type-option expense-option">
                                <input type="radio" name="type" value="expense">
                                <span>💸 Расход</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="amount">Сумма</label>
                        <input type="number" step="0.01" id="amount" name="amount" 
                               placeholder="0.00 ₽" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Категория</label>
                        <select id="category" name="category" required>
                            <option value="">Выберите категорию</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Описание</label>
                        <input type="text" id="description" name="description" 
                               placeholder="Например: Продукты в магазине">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    ✨ Добавить операцию
                </button>
            </form>
        </div>

        <!-- Список операций -->
        <div class="transactions-card glass-effect">
            <h3>📋 Последние операции</h3>
            <div id="transactionsList" class="transactions-list">
                <!-- Загружается через JS -->
            </div>
        </div>
    </div>

    <!-- Модальное окно для редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content glass-effect">
            <span class="close">&times;</span>
            <h3>✏️ Редактировать операцию</h3>
            <form id="editForm" method="POST">
                <!-- Поля будут заполняться через JS -->
            </form>
        </div>
    </div>

    <script src="/script.js"></script>
    <script src="/charts.js"></script>
</body>
</html>
